name: Bug Report
description: Report a bug in Hospital Management System
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please provide as much information as possible.
  
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What is the issue you're experiencing?
    validations:
      required: true
  
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: Expected behavior...
    validations:
      required: true
  
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
      placeholder: Actual behavior...
    validations:
      required: true
  
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  
  - type: input
    id: compiler
    attributes:
      label: Compiler Version
      description: "e.g., g++ 11.2.0, MSVC 19.3"
      placeholder: "g++ version..."
  
  - type: textarea
    id: logs
    attributes:
      label: Error logs or screenshots
      description: If applicable, add error messages or screenshots
      placeholder: Paste error logs here...
  
  - type: checkboxes
    attributes:
      label: Acknowledgments
      options:
        - label: I have searched existing issues
          required: true
        - label: This is not a duplicate
          required: true
