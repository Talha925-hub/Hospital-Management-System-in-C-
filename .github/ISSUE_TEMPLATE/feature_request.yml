name: Feature Request
description: Request a new feature for Hospital Management System
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Help us improve the project.
  
  - type: textarea
    id: description
    attributes:
      label: Is your feature request related to a problem?
      description: Describe the problem. e.g., "I'm always frustrated when..."
      placeholder: Problem description...
  
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution
      description: Clear and concise description of the desired feature
      placeholder: What should this feature do?
    validations:
      required: true
  
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives
      description: Any alternative approaches or features you've considered
      placeholder: Other alternatives...
  
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context or screenshots about the feature
      placeholder: Additional information...
  
  - type: checkboxes
    attributes:
      label: Acknowledgments
      options:
        - label: I have searched existing issues and discussions
          required: true
        - label: This is not a duplicate
          required: true